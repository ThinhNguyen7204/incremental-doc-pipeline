<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OptiBot Support Assistant</title>
  <meta name="description" content="OptiBot customer-support assistant for OptiSigns documentation.">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>
  <main class="app-shell" aria-label="OptiBot chat application">
    <section class="chat-panel" aria-labelledby="app-title">
      <header class="topbar">
        <div class="brand">
          <div class="bot-orb" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-bot-icon lucide-bot">
              <path d="M12 8V4H8" />
              <rect width="16" height="12" x="4" y="8" rx="2" />
              <path d="M2 14h2" />
              <path d="M20 14h2" />
              <path d="M15 13v2" />
              <path d="M9 13v2" />
            </svg>
          </div>
          <h1 id="app-title">OptiBot</h1>
        </div>
      </header>

      <div id="chatFeed" class="chat-feed" aria-live="polite">
        <article class="message-row bot-message intro-message">
          <div class="mini-bot" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-bot-icon lucide-bot">
              <path d="M12 8V4H8" />
              <rect width="16" height="12" x="4" y="8" rx="2" />
              <path d="M2 14h2" />
              <path d="M20 14h2" />
              <path d="M15 13v2" />
              <path d="M9 13v2" />
            </svg>
          </div>
          <div class="bubble bot-bubble">
            Hi! I'm <strong>OptiBot</strong>, your AI assistant for OptiSigns. I can help you with setup,
            troubleshooting, managing your screens, playlists, and schedules. How can I help you today?
          </div>
        </article>
      </div>

      <form id="chatForm" class="composer" autocomplete="off">
        <label class="sr-only" for="messageInput">Ask OptiBot</label>
        <div class="composer-inner">
          <textarea id="messageInput" name="message" rows="1" placeholder="Ask me anything..." required></textarea>
          <button id="sendBtn" class="send-btn" type="submit" aria-label="Send message">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M3.4 20.4 21 12 3.4 3.6 3 10l10 2-10 2 .4 6.4ZM5 16.9l.1-1.3 7.3-1.5c1.2-.2 1.2-1.9 0-2.2L5.1 10.4 5 7.1 17.2 12 5 16.9Z" />
            </svg>
          </button>
        </div>
      </form>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>

</html>
